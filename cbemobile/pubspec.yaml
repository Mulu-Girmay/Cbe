name: cbe_mobile_app
description: CBE Banking App Clone - Learning Project
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  firebase_messaging: ^14.7.9

  # State Management
  provider: ^6.0.5

  # Networking
  http: ^1.1.0
  dio: ^5.3.2

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # Navigation
  go_router: ^13.0.1

  # Utilities
  intl: ^0.18.1
  qr_code_scanner: ^1.0.1
  image_picker: ^1.0.4

  # Notifications
  flutter_local_notifications: ^15.1.1

  # Loading indicators
  flutter_spinkit: ^5.2.0

  # Form validation
  flutter_form_builder: ^9.1.0

  # Icons
  font_awesome_flutter: ^10.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
